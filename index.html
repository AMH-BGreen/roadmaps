<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMH Product Roadmap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --hb: #004879;       /* Heritage Blue */
      --hr: #DD1C23;       /* Heritage Red */
      --sb: #1967D2;       /* Sky Blue */
      --db: #041624;       /* Dark Blue */
      --bg: #F4F6F9;       /* Page background */
      --tl-bg: #ffffff;    /* Timeline canvas background */
      --border: #e2e8f0;
      --border2: #edf2f7;
      --text: #18243a;
      --text2: #64748b;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --nav-h: 56px;
      --drawer-w: 480px;
      --label-w: 220px;
      --header-h: 72px;   /* 2 visible rows + month row */
      --bar-h: 56px;
      --lane-h: 72px;     /* bar-h + gap */
      --swim-pad: 16px;
      --swim-strip: 40px; /* section divider height */
      --card-radius: 10px;
    }
    html, body, #root { height: 100%; overflow: hidden; }
    body { font-family: var(--font); font-size: 13px; color: var(--text);
           background: var(--bg); -webkit-font-smoothing: antialiased; }
    button { font-family: var(--font); cursor: pointer; border: none; background: none; }
    input, textarea, select { font-family: var(--font); font-size: 13px; }

    /* ── App Shell ──────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .main-area { display: flex; flex: 1; overflow: hidden; }

    /* ── Top Nav ────────────────────────────────────────────────────── */
    .top-nav { height: var(--nav-h); background: white; border-bottom: 1px solid var(--border);
               display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; z-index: 50;
               box-shadow: 0 1px 3px rgba(0,0,0,.05); gap: 0; }
    .nav-brand { display: flex; align-items: center; gap: 10px; padding-right: 20px;
                 border-right: 1px solid var(--border); margin-right: 20px; flex-shrink: 0; }
    .nav-logo { width: 6px; height: 26px; border-radius: 2px; background: var(--hr); }
    .nav-title { font-size: 14px; font-weight: 700; color: var(--db); white-space: nowrap; letter-spacing: -0.02em; }
    .nav-filters { display: flex; align-items: center; gap: 6px; flex: 1; overflow-x: auto; overflow-y: hidden; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 16px; }

    /* ── MultiSelect ────────────────────────────────────────────────── */
    .ms-trigger { height: 32px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px;
                  font-size: 12px; font-weight: 500; color: var(--text2); background: white;
                  display: flex; align-items: center; gap: 6px; white-space: nowrap;
                  transition: border-color .15s, color .15s, background .15s; cursor: pointer; }
    .ms-trigger:hover { border-color: var(--hb); background: #f8fbff; }
    .ms-trigger.sel { color: var(--hb); border-color: #b8d4e8; background: #eef6fd; font-weight: 600; }
    .ms-caret { font-size: 8px; opacity: .5; }
    .ms-drop { position: absolute; top: calc(100% + 6px); left: 0; background: white;
               border: 1px solid var(--border); border-radius: 8px;
               box-shadow: 0 8px 24px rgba(0,0,0,.10); z-index: 200; min-width: 170px; padding: 6px; }
    .ms-opt { display: flex; align-items: center; gap: 9px; padding: 7px 10px;
              font-size: 12px; cursor: pointer; border-radius: 5px; user-select: none; }
    .ms-opt:hover { background: #f4f8fd; }
    .ms-opt input[type=checkbox] { margin: 0; accent-color: var(--hb); }
    .nav-sel { height: 32px; padding: 0 10px; border: 1px solid var(--border); border-radius: 6px;
               font-size: 12px; color: var(--text2); background: white; cursor: pointer; }
    .nav-sel:hover { border-color: var(--hb); }
    .clear-btn { height: 32px; padding: 0 12px; font-size: 12px; color: var(--hr);
                 border: 1px solid #f5c0c0; border-radius: 6px; background: #fff5f5;
                 font-weight: 500; white-space: nowrap; cursor: pointer; }
    .clear-btn:hover { background: #ffe8e8; }

    /* ── Zoom Buttons ───────────────────────────────────────────────── */
    .zoom-grp { display: flex; background: var(--bg); border: 1px solid var(--border);
                border-radius: 7px; overflow: hidden; padding: 2px; gap: 1px; }
    .zoom-btn { padding: 0 12px; height: 26px; font-size: 12px; font-weight: 500; color: var(--text2);
                background: transparent; border-radius: 5px; cursor: pointer;
                transition: background .12s, color .12s; }
    .zoom-btn:hover { background: white; color: var(--text); }
    .zoom-btn.z-on { background: white; color: var(--hb); font-weight: 600;
                     box-shadow: 0 1px 4px rgba(0,0,0,.10); }
    .zoom-pm { width: 26px; height: 26px; border-radius: 6px; font-size: 17px; font-weight: 500;
               color: var(--text2); background: var(--bg); border: 1px solid var(--border);
               display: flex; align-items: center; justify-content: center; cursor: pointer;
               transition: background .12s, color .12s, border-color .12s; line-height: 1; }
    .zoom-pm:hover:not(:disabled) { background: white; color: var(--hb); border-color: #b8d4e8; }
    .zoom-pm:disabled { opacity: .3; cursor: not-allowed; }

    /* ── Floating Zoom Control ──────────────────────────────────────── */
    .zoom-fab { position: fixed; bottom: 24px; right: 24px; z-index: 40;
                display: flex; align-items: center; gap: 8px;
                background: white; border: 1px solid var(--border);
                border-radius: 12px; padding: 6px 10px;
                box-shadow: 0 4px 16px rgba(0,0,0,.12), 0 1px 4px rgba(0,0,0,.06); }
    .zoom-fab-label { font-size: 11px; font-weight: 700; color: var(--text2);
                      letter-spacing: .06em; text-transform: uppercase; user-select: none; }
    .zoom-fab-btn { width: 28px; height: 28px; border-radius: 7px; font-size: 18px; font-weight: 400;
                    color: var(--text); background: var(--bg); border: 1px solid var(--border);
                    display: flex; align-items: center; justify-content: center; cursor: pointer;
                    transition: background .12s, color .12s, border-color .12s; line-height: 1; }
    .zoom-fab-btn:hover:not(:disabled) { background: var(--hb); color: white; border-color: var(--hb); }
    .zoom-fab-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ── Buttons ────────────────────────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; justify-content: center;
           height: 34px; padding: 0 16px; border-radius: 7px; font-size: 13px;
           font-weight: 600; cursor: pointer; transition: filter .15s; }
    .btn:hover { filter: brightness(.92); }
    .btn:disabled { opacity: .45; cursor: not-allowed; filter: none; }
    .btn-sm { height: 32px; padding: 0 14px; font-size: 12px; }
    .btn-pri { background: var(--hb); color: white; box-shadow: 0 2px 6px rgba(0,72,121,.25); }
    .btn-del { background: #fff; color: var(--hr); border: 1px solid #f5c0c0; }
    .btn-del:hover { background: #fff5f5; filter: none; }
    .icon-btn { width: 34px; height: 34px; border-radius: 7px; font-size: 16px; color: var(--text2);
                display: flex; align-items: center; justify-content: center; transition: background .1s; }
    .icon-btn:hover { background: var(--bg); }

    /* ── Settings ───────────────────────────────────────────────────── */
    .set-drop { position: absolute; top: calc(100% + 6px); right: 0; background: white;
                border: 1px solid var(--border); border-radius: 8px;
                box-shadow: 0 8px 24px rgba(0,0,0,.10); z-index: 200; min-width: 190px; padding: 6px; }
    .set-item { display: block; width: 100%; text-align: left; padding: 7px 12px; font-size: 13px;
                color: var(--text); border-radius: 5px; background: none; cursor: pointer; }
    .set-item:hover { background: #f4f6f9; }
    .set-danger { color: var(--hr); }
    .set-div { height: 1px; background: var(--border); margin: 5px 8px; }

    /* ── Timeline canvas ────────────────────────────────────────────── */
    .tl-scroll { flex: 1; overflow: auto; background: var(--bg); position: relative; }

    /* ── Timeline Header ────────────────────────────────────────────── */
    .tl-header { position: sticky; top: 0; z-index: 30; display: flex; flex-shrink: 0;
                 height: var(--header-h); background: white;
                 border-bottom: 1px solid var(--border);
                 box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .hdr-corner { flex-shrink: 0; position: sticky; left: 0; z-index: 35;
                  width: var(--label-w); background: white;
                  border-right: 1px solid var(--border);
                  display: flex; align-items: flex-end; padding: 0 20px 8px;
                  transition: width .22s ease, padding .22s ease; overflow: hidden; }
    .hdr-corner-label { color: var(--text2); font-weight: 600; font-size: 11px;
                        text-transform: uppercase; letter-spacing: .07em; }
    .hdr-dates { flex-shrink: 0; position: relative; overflow: hidden; height: var(--header-h); }
    .hdr-seg { position: absolute; display: flex; align-items: center;
               padding-left: 8px; overflow: hidden; white-space: nowrap;
               border-right: 1px solid var(--border2); box-sizing: border-box; }

    /* Today indicator in header */
    .hdr-today-wrap { position: absolute; z-index: 6; pointer-events: none; top: 0; }
    .hdr-today-line { position: absolute; width: 2px; background: var(--hr); top: 0; }
    .hdr-today-badge { position: absolute; background: var(--hr); color: white;
                       font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
                       white-space: nowrap; transform: translateX(-50%);
                       box-shadow: 0 2px 6px rgba(221,28,35,.35); }

    /* ── Swimlane ───────────────────────────────────────────────────── */
    .swimlane { }
    .swim-row { display: flex; }
    .swim-label { width: var(--label-w); flex-shrink: 0; position: sticky; left: 0; z-index: 15;
                  display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 16px;
                  background: white; border-right: 1px solid var(--border);
                  user-select: none;
                  transition: width .22s ease, background .22s ease, border-color .22s ease, padding .22s ease; }
    .swim-label-inner { display: flex; align-items: center; gap: 8px; width: 100%; }
    .swim-area-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .swim-toggle { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
                   border-radius: 5px; flex-shrink: 0; color: var(--text2); transition: background .1s; }
    .swim-toggle:hover { background: var(--bg); }
    .swim-name { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -.01em;
                 flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .swim-count { font-size: 11px; font-weight: 600; color: var(--text2);
                  background: var(--bg); border: 1px solid var(--border);
                  border-radius: 10px; padding: 1px 8px; flex-shrink: 0; }

    /* Swimlane section-header strip (area label row across timeline) */
    .swim-section-strip { position: absolute; left: 0; right: 0; top: 0;
                          display: flex; align-items: center; padding-left: 16px;
                          border-bottom: 1px solid var(--border2); }
    .swim-section-line { flex: 1; height: 1px; background: var(--border2); margin-left: 8px; margin-right: 16px; }

    /* Timeline content canvas */
    .swim-content { position: relative; flex-shrink: 0; background: var(--tl-bg); }

    /* Subtle alternating swimlane tint */
    .swimlane:nth-child(even) .swim-content { background: #fafbfd; }
    .swimlane:nth-child(even) .swim-label { background: #fafbfd; }

    /* Separator between swimlanes */
    .swimlane { border-top: 1px solid var(--border); }
    .swimlane:first-child { border-top: none; }

    /* ── Product Area Manager Modal ─────────────────────────────── */
    .area-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px;
                 background: var(--bg); border-radius: 7px; font-size: 13px; color: var(--text); }
    .area-color-swatch { width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid rgba(0,0,0,.12);
                         cursor: pointer; padding: 0; background: none; flex-shrink: 0; overflow: hidden; }
    .area-color-swatch input[type=color] { width: 200%; height: 200%; transform: translate(-25%,-25%);
                                           border: none; cursor: pointer; padding: 0; }
    .area-add-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }

    /* Grid lines — subtle dashed verticals */
    .grid-line { position: absolute; top: 0; width: 1px;
                 background: repeating-linear-gradient(
                   to bottom, #cbd5e1 0px, #cbd5e1 4px, transparent 4px, transparent 8px
                 ); pointer-events: none; }
    .grid-line-major { background: #b0bec5; }

    /* ── Initiative Bar (card style) ───────────────────────────────── */
    .ibar { position: absolute; background: white; border-radius: var(--card-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06),
                        0 0 0 1px rgba(0,0,0,.05);
            display: flex; align-items: stretch; user-select: none; cursor: grab;
            transition: box-shadow .15s, opacity .2s; overflow: hidden; }
    .ibar:hover { box-shadow: 0 4px 16px rgba(0,0,0,.14), 0 8px 28px rgba(0,0,0,.08),
                              0 0 0 1px rgba(0,0,0,.08); z-index: 10; }
    .ibar.filtered { opacity: .12; pointer-events: none; }
    .ibar.selected { z-index: 20;
                     box-shadow: 0 0 0 2px var(--hb), 0 4px 16px rgba(0,0,0,.14); }

    /* Left accent stripe */
    .bar-stripe { width: 5px; flex-shrink: 0; border-radius: var(--card-radius) 0 0 var(--card-radius); }

    /* Resize handles */
    .bar-hdl { position: absolute; top: 0; width: 10px; height: 100%;
               cursor: ew-resize; z-index: 5; display: flex; align-items: center;
               justify-content: center; opacity: 0; transition: opacity .15s; }
    .ibar:hover .bar-hdl { opacity: 1; }
    .bar-hdl::after { content:''; width: 3px; height: 18px;
                      background: rgba(0,0,0,.2); border-radius: 2px; }
    .bar-hdl-l { left: 5px; }
    .bar-hdl-r { right: 0; }

    /* Bar content */
    .bar-inner { flex: 1; padding: 8px 10px 8px 10px; overflow: hidden; min-width: 0;
                 display: flex; flex-direction: column; justify-content: center; gap: 3px; }
    .bar-name { font-size: 12px; font-weight: 700; color: var(--text);
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .bar-meta { font-size: 10.5px; color: var(--text2);
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2;
                display: flex; align-items: center; gap: 5px; }
    .bar-meta-sep { color: #c8d3de; }

    /* Quarter-only dashed outline */
    .ibar.q-only { background: rgba(255,255,255,.7); }
    .ibar.q-only::before { content:''; position:absolute; inset:0; border-radius:inherit;
                            border: 2px dashed currentColor; opacity:.4; pointer-events:none; }

    /* Tooltip ──────────────────────────────────────────────────────── */
    .tooltip { position: fixed; z-index: 9999; background: var(--db); color: white;
               border-radius: 10px; padding: 12px 14px; min-width: 230px; max-width: 320px;
               box-shadow: 0 8px 30px rgba(0,0,0,.25); pointer-events: none; font-size: 12px; }
    .tip-title { font-size: 13px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,.12);
                 padding-bottom: 8px; margin-bottom: 8px; line-height: 1.35; }
    .tip-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; }
    .tip-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em;
               color: rgba(255,255,255,.45); width: 46px; flex-shrink: 0; }
    .tip-desc { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,.1);
                font-size: 11px; color: rgba(255,255,255,.72); line-height: 1.55; }

    /* ── Drawer ─────────────────────────────────────────────────────── */
    .drawer { width: var(--drawer-w); flex-shrink: 0; display: flex; flex-direction: column;
              background: white; border-left: 1px solid var(--border); height: 100%;
              overflow: hidden; box-shadow: -6px 0 24px rgba(0,0,0,.07); }
    .drw-hdr { padding: 20px 22px 16px; border-bottom: 1px solid var(--border);
               background: white; flex-shrink: 0; }
    .drw-hdr-top { display: flex; justify-content: space-between; align-items: flex-start;
                   gap: 12px; margin-bottom: 12px; }
    .drw-hdr-acts { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-top: 2px; }
    .drw-area-tag { font-size: 11px; font-weight: 700; text-transform: uppercase;
                    letter-spacing: .08em; margin-bottom: 5px; color: var(--hb); }
    .drw-title-wrap { flex: 1; }
    .drw-title { width: 100%; font-size: 18px; font-weight: 700; color: var(--text);
                 border: none; outline: none; background: transparent; line-height: 1.3; padding: 0; }
    .drw-title:focus { color: var(--hb); }
    .drw-title::placeholder { color: #c8d3de; }
    .drw-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px;
            font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .pill-crit { color: white; }
    .pill-st, .pill-conf { background: #f0f4f8; color: var(--text2); border: 1px solid var(--border); }
    .save-ok { font-size: 11px; color: #1E7D4A; font-weight: 600; }
    .drw-close { font-size: 16px; color: var(--text2); width: 30px; height: 30px;
                 border-radius: 6px; display: flex; align-items: center; justify-content: center;
                 transition: background .1s; }
    .drw-close:hover { background: var(--bg); color: var(--text); }
    .drw-body { flex: 1; overflow-y: auto; }
    .drw-sec { padding: 16px 22px; border-bottom: 1px solid var(--border2); }
    .drw-sec-title { font-size: 10px; font-weight: 700; text-transform: uppercase;
                     letter-spacing: .1em; color: var(--text2); margin-bottom: 12px; }
    .drw-fld { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .drw-fld:last-child { margin-bottom: 0; }
    .drw-lbl { font-size: 11px; font-weight: 600; color: var(--text2);
               text-transform: uppercase; letter-spacing: .06em; }
    .drw-input { width: 100%; height: 34px; padding: 0 11px; border: 1px solid var(--border);
                 border-radius: 6px; font-size: 13px; color: var(--text); background: white;
                 transition: border-color .15s; outline: none; }
    .drw-input:focus { border-color: var(--hb); box-shadow: 0 0 0 3px rgba(0,72,121,.09); }
    .drw-ta { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 6px;
              font-size: 13px; color: var(--text); background: white; resize: vertical;
              line-height: 1.55; transition: border-color .15s; outline: none; min-height: 64px; }
    .drw-ta:focus { border-color: var(--hb); box-shadow: 0 0 0 3px rgba(0,72,121,.09); }
    .drw-sel { width: 100%; height: 34px; padding: 0 11px; border: 1px solid var(--border);
               border-radius: 6px; font-size: 13px; color: var(--text); background: white;
               cursor: pointer; outline: none; }
    .drw-sel:focus { border-color: var(--hb); }
    .radio-grp { display: flex; gap: 16px; }
    .radio-grp label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
    .radio-grp input[type=radio] { accent-color: var(--hb); }
    .drw-actions { padding: 16px 22px 28px; display: flex; justify-content: flex-end; }

    /* ── PM Manager Modal ──────────────────────────────────────────── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(4,22,36,.45); z-index: 8000;
                     display: flex; align-items: center; justify-content: center; }
    .modal { background: white; border-radius: 12px; width: 380px; max-height: 76vh;
             display: flex; flex-direction: column;
             box-shadow: 0 24px 64px rgba(0,0,0,.22), 0 0 0 1px rgba(0,0,0,.06); }
    .modal-hdr { display: flex; align-items: center; justify-content: space-between;
                 padding: 18px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
                    display: flex; justify-content: flex-end; }
    .pm-add-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .pm-list { display: flex; flex-direction: column; gap: 4px; }
    .pm-item { display: flex; align-items: center; justify-content: space-between;
               padding: 8px 12px; background: var(--bg); border-radius: 7px;
               font-size: 13px; color: var(--text); }
    .pm-empty { font-size: 12px; color: var(--text2); padding: 6px 0; }

    /* ── User Management Modal ──────────────────────────────────────── */
    .usr-list { display: flex; flex-direction: column; gap: 4px; padding: 6px 0; }
    .usr-row { display: flex; align-items: center; gap: 12px; padding: 8px 12px;
               border-radius: 8px; transition: background .12s; }
    .usr-row:hover { background: var(--bg); }
    .usr-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
                  justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
    .usr-info { flex: 1; min-width: 0; }
    .usr-name  { display: block; font-size: 13px; font-weight: 600; color: var(--text); }
    .usr-email { display: block; font-size: 11px; color: var(--text2); white-space: nowrap;
                 overflow: hidden; text-overflow: ellipsis; }
    .usr-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .usr-role-sel { height: 28px; padding: 0 8px; border: 1px solid var(--border); border-radius: 6px;
                    font-size: 12px; font-weight: 500; color: var(--text); background: white;
                    cursor: pointer; outline: none; }
    .usr-role-sel:focus { border-color: var(--hb); }
    .usr-remove { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center;
                  justify-content: center; font-size: 12px; color: var(--text2);
                  transition: background .12s, color .12s; }

    /* ═══════════════════════════════════════════════════════════════
       TIMELINE UTILITIES
    ═══════════════════════════════════════════════════════════════ */
    const Q_MONTHS = { Q1:[0,2], Q2:[3,5], Q3:[6,8], Q4:[9,11] };

    function fmtDate(date) {
      if (!date) return '';
      const d = new Date(date);
      if (isNaN(d.getTime())) return '';
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    function fmtDateDisp(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }

    function getStart(ini) {
      if (ini.startDate) return new Date(ini.startDate);
      if (ini.quarter) {
        const [q, yr] = ini.quarter.split(' ');
        return new Date(parseInt(yr), Q_MONTHS[q][0], 1);
      }
      return new Date(TL_START);
    }

    function getEnd(ini) {
      if (ini.endDate) return new Date(ini.endDate);
      if (ini.quarter) {
        const [q, yr] = ini.quarter.split(' ');
        const em = Q_MONTHS[q][1];
        return new Date(parseInt(yr), em+1, 0);
      }
      return new Date(TL_END);
    }

    function toPx(date, dpx) {
      const d = typeof date === 'string' ? new Date(date) : date;
      return ((d - TL_START) / 86400000) * dpx;
    }

    function toDate(px, dpx) {
      return new Date(TL_START.getTime() + (px/dpx)*86400000);
    }

    function snapDate(date, zoom) {
      const d = new Date(date);
      if (zoom === 'quarter') {
        if (d.getDate() <= 15) { d.setDate(1); }
        else {
          if (d.getMonth() === 11) d.setFullYear(d.getFullYear()+1,0,1);
          else d.setMonth(d.getMonth()+1,1);
        }
      } else if (zoom === 'month') {
        const dow = d.getDay();
        const back = dow === 0 ? 6 : dow-1;
        const fwd = 7-back;
        d.setDate(d.getDate() + (back <= fwd ? -back : fwd));
      }
      return d;
    }

    function totalW(dpx) {
      return ((TL_END - TL_START) / 86400000) * dpx;
    }

    // Build header segments
    const HEADERS = (() => {
      const years=[], quarters=[], months=[];
      for (let yr=2026; yr<=2027; yr++) {
        years.push({ label:String(yr), start:new Date(yr,0,1), end:new Date(yr+1,0,1) });
        for (let q=0;q<4;q++) {
          quarters.push({ label:`Q${q+1}`, start:new Date(yr,q*3,1), end:new Date(yr,q*3+3,1) });
        }
        for (let m=0;m<12;m++) {
          months.push({ label:MONTH_NAMES[m], start:new Date(yr,m,1), end:new Date(yr,m+1,1) });
        }
      }
      return { years, quarters, months };
    })();

    // Assign bars to non-overlapping horizontal lanes.
    // Two-pass: bars with an explicit ini.lane are placed first, then the rest auto-assign.
    function assignLanes(inis) {
      if (!inis.length) return [];
      const sorted = [...inis].sort((a,b) => getStart(a) - getStart(b));
      const laneEnds = [];
      const result = [];

      // Pass 1: honour explicit lane
      for (const ini of sorted) {
        if (ini.lane == null) continue;
        const l = ini.lane;
        while (laneEnds.length <= l) laneEnds.push(new Date(0));
        const e = getEnd(ini);
        if (e > laneEnds[l]) laneEnds[l] = e;
        result.push({ ...ini, _lane: l });
      }

      // Pass 2: auto-assign the rest
      for (const ini of sorted) {
        if (ini.lane != null) continue;
        const s = getStart(ini), e = getEnd(ini);
        let li = laneEnds.findIndex(le => le <= s);
        if (li === -1) { li = laneEnds.length; laneEnds.push(e); }
        else laneEnds[li] = e;
        result.push({ ...ini, _lane: li });
      }

      return result;
    }

    function contentH(laned) {
      if (!laned.length) return SWIM_PAD*2 + LANE_H;
      const maxL = Math.max(...laned.map(i => i._lane||0));
      return SWIM_PAD + (maxL+1)*LANE_H - (LANE_H - BAR_H) + SWIM_PAD;
    }

    /* ═══════════════════════════════════════════════════════════════
       useLocalStorage HOOK
    ═══════════════════════════════════════════════════════════════ */
    function useLocalStorage(key, init) {
      const [val, setVal] = useState(() => {
        try {
          const s = localStorage.getItem(key);
          return s ? JSON.parse(s) : init;
        } catch { return init; }
      });
      useEffect(() => {
        try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
      }, [key, val]);
      return [val, setVal];
    }

    /* ═══════════════════════════════════════════════════════════════
       TOOLTIP
    ═══════════════════════════════════════════════════════════════ */
    function Tooltip({ ini, anchor }) {
      const ref = useRef(null);
      const [pos, setPos] = useState({ top: -9999, left: -9999 });

      useEffect(() => {
        if (!ref.current || !anchor) return;
        const tip = ref.current.getBoundingClientRect();
        const M = 10;
        let top = anchor.top - tip.height - M;
        if (top < M) top = anchor.bottom + M;
        let left = anchor.left + anchor.width/2 - tip.width/2;
        left = Math.max(M, Math.min(left, window.innerWidth - tip.width - M));
        setPos({ top, left });
      }, [anchor]);

      const isQOnly = ini.quarterOnly && !ini.startDate;
      const dateStr = isQOnly
        ? ini.quarter
        : `${fmtDateDisp(ini.startDate)} – ${fmtDateDisp(ini.endDate)}`;

      return createPortal(
        <div ref={ref} className="tooltip" style={{ top: pos.top, left: pos.left }}>
          <div className="tip-title">{ini.name}</div>
          <div className="tip-row"><span className="tip-lbl">PM</span><span>{ini.pmOwner||'—'}</span></div>
          <div className="tip-row"><span className="tip-lbl">Dates</span><span>{dateStr}</span></div>
          <div className="tip-row">
            <span className="tip-lbl">Status</span>
            <span style={{color:STATUS_COLORS[ini.status]||'#333'}}>{ini.status}</span>
          </div>
          <div className="tip-row">
            <span className="tip-lbl">Priority</span>
            <span style={{color:CRIT_COLORS[ini.criticality]||'#333'}}>{ini.criticality}</span>
          </div>
          {ini.description && <div className="tip-desc">{ini.description}</div>}
        </div>,
        document.body
      );
    }

    function IBar({ ini, dpx, zoom, filtered, selected, onSelect, onUpdate }) {
      const { user } = useAuth();

      const barRef = useRef(null);
      const tipTimer = useRef(null);
      const [tipAnchor, setTipAnchor] = useState(null);

      const s = getStart(ini), e = getEnd(ini);
      const left = toPx(s, dpx);
      const right = toPx(e, dpx);
      const width = Math.max(right - left, dpx);
      const top = SWIM_PAD + (ini._lane||0) * LANE_H;
      const critColor = CRIT_COLORS[ini.criticality] || '#9E9E9E';
      const isQ = ini.quarterOnly && !ini.startDate;

      const drag = useCallback((e0, type) => {
        if (e0.button !== 0) return;
        e0.preventDefault(); e0.stopPropagation();
        clearTimeout(tipTimer.current); setTipAnchor(null);

        const startX = e0.clientX;
        const origL = left, origW = width;
        const tw = totalW(dpx);

        const onMove = (e) => {
          if (!barRef.current) return;
          const dx = e.clientX - startX;
          let nl = origL, nw = origW;
          if (type==='move') { nl = origL+dx; nw = origW; }
          else if (type==='left') { nl = origL+dx; nw = origW-dx; if(nw<dpx){nw=dpx;nl=origL+origW-dpx;} }
          else if (type==='right') { nw = Math.max(origW+dx, dpx); }
          nl = Math.max(0, nl);
          if (type==='move' && nl+nw>tw) nl=tw-nw;
          if (type==='right' && nl+nw>tw) nw=tw-nl;
          barRef.current.style.left = nl+'px';
          barRef.current.style.width = nw+'px';
          barRef.current._curL = nl; barRef.current._curR = nl+nw;
        };

        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (!barRef.current) return;
          const cl = barRef.current._curL ?? left;
          const cr = barRef.current._curR ?? (left+width);
          let ns = snapDate(toDate(cl, dpx), zoom);
          let ne = snapDate(toDate(cr, dpx), zoom);
          if (type==='move') {
            const dur = e.getTime ? 0 : (getEnd(ini) - getStart(ini));
            ne = new Date(ns.getTime() + dur);
          }
          if (ne <= ns) ne = new Date(ns.getTime() + 86400000);
          if (ns < TL_START) ns = new Date(TL_START);
          if (ne > TL_END) ne = new Date(TL_END);
          onUpdate(ini.id, { startDate:fmtDate(ns), endDate:fmtDate(ne), quarterOnly:false, quarter:null });
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }, [ini, dpx, zoom, onUpdate, left, width]);

      const dragMove = useCallback((e0) => {
        if (e0.button !== 0) return;
        e0.preventDefault(); e0.stopPropagation();
        clearTimeout(tipTimer.current); setTipAnchor(null);

        const startX = e0.clientX;
        const startY = e0.clientY;
        const origL = left, origW = width;
        const origTop = top;
        const tw = totalW(dpx);
        const durMs = getEnd(ini) - getStart(ini);
        const curLane = ini._lane || 0;

        const onMove = (e) => {
          if (!barRef.current) return;
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          let nl = Math.max(0, origL + dx);
          if (nl + origW > tw) nl = tw - origW;
          const newLane = Math.max(0, curLane + Math.round(dy / LANE_H));
          barRef.current.style.left = nl + 'px';
          barRef.current.style.top = (SWIM_PAD + newLane * LANE_H) + 'px';
          barRef.current._curL = nl;
          barRef.current._curLane = newLane;
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (!barRef.current) return;
          const cl = barRef.current._curL ?? left;
          const finalLane = barRef.current._curLane ?? curLane;
          let ns = snapDate(toDate(cl, dpx), zoom);
          let ne = new Date(ns.getTime() + durMs);
          if (ns < TL_START) ns = new Date(TL_START);
          if (ne > TL_END) ne = new Date(TL_END);
          onUpdate(ini.id, { startDate:fmtDate(ns), endDate:fmtDate(ne), lane:finalLane, quarterOnly:false, quarter:null });
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }, [ini, dpx, zoom, onUpdate, left, width, top]);

      const dragEdge = useCallback((e0, side) => {
        if (e0.button !== 0) return;
        e0.preventDefault(); e0.stopPropagation();
        clearTimeout(tipTimer.current); setTipAnchor(null);

        const startX = e0.clientX;
        const origL = left, origR = left + width;
        const tw = totalW(dpx);

        const onMove = (e) => {
          if (!barRef.current) return;
          const dx = e.clientX - startX;
          let nl = origL, nw = width;
          if (side==='left') {
            nl = Math.max(0, origL + dx);
            nw = Math.max(dpx, origR - nl);
            nl = origR - nw;
          } else {
            nw = Math.max(dpx, width + dx);
            if (origL + nw > tw) nw = tw - origL;
          }
          barRef.current.style.left = nl+'px';
          barRef.current.style.width = nw+'px';
          barRef.current._curL = nl; barRef.current._curR = nl+nw;
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          if (!barRef.current) return;
          const cl = barRef.current._curL ?? left;
          const cr = barRef.current._curR ?? (left+width);
          let ns = snapDate(toDate(cl, dpx), zoom);
          let ne = snapDate(toDate(cr, dpx), zoom);
          if (ne <= ns) ne = new Date(ns.getTime() + 86400000);
          if (ns < TL_START) ns = new Date(TL_START);
          if (ne > TL_END) ne = new Date(TL_END);
          onUpdate(ini.id, { startDate:fmtDate(ns), endDate:fmtDate(ne), quarterOnly:false, quarter:null });
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }, [ini, dpx, zoom, onUpdate, left, width]);

      const onEnter = () => {
        tipTimer.current = setTimeout(() => {
          if (barRef.current) setTipAnchor(barRef.current.getBoundingClientRect());
        }, 300);
      };
      const onLeave = () => { clearTimeout(tipTimer.current); setTipAnchor(null); };
      const onClick = (e) => { e.stopPropagation(); onSelect(ini.id); };

      const dateStr = isQ
        ? ini.quarter
        : `${fmtDateDisp(ini.startDate)} – ${fmtDateDisp(ini.endDate)}`;

      return (
        <>
          <div
            ref={barRef}
            className={`ibar${isQ?' q-only':''}${filtered?' filtered':''}${selected?' selected':''}`}
            style={{ left:`${left}px`, width:`${width}px`, top:`${top}px`, height:`${BAR_H}px`,
                     cursor: canEdit ? 'grab' : 'pointer' }}
            onMouseDown={canEdit ? dragMove : undefined}
            onClick={onClick}
            onMouseEnter={onEnter}
            onMouseLeave={onLeave}
          >
            <div className="bar-stripe" style={{background:critColor}} />
            {canEdit && <div className="bar-hdl bar-hdl-l"
              onMouseDown={e=>{e.stopPropagation();dragEdge(e,'left');}} />}
            <div className="bar-inner">
              <div className="bar-name">{ini.name}</div>
              {width > 120 && (
                <div className="bar-meta">
                  {ini.pmOwner && <span>{ini.pmOwner}</span>}
                  {ini.pmOwner && <span className="bar-meta-sep">·</span>}
                  <span>{dateStr}</span>
                </div>
              )}
            </div>
            {canEdit && <div className="bar-hdl bar-hdl-r"
              onMouseDown={e=>{e.stopPropagation();dragEdge(e,'right');}} />}
          </div>
          {tipAnchor && <Tooltip ini={ini} anchor={tipAnchor} />}
        </>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       SWIMLANE
    ═══════════════════════════════════════════════════════════════ */
    function Swimlane({ area, inis, dpx, zoom, filters, collapsed, onToggle, selId, onSelect, onUpdate, onBatchUpdate, areaColorMap, isScrolled }) {
      const laned = useMemo(() => assignLanes(inis), [inis]);
      const ch = useMemo(() => contentH(laned), [laned]);
      const tw = totalW(dpx);

      const handleDragDrop = useCallback((id, patch) => {
        if (!patch.startDate || !patch.endDate) { onBatchUpdate({ [id]: patch }); return; }
        const ns = new Date(patch.startDate);
        const ne = new Date(patch.endDate);
        const dragged = laned.find(i => i.id === id);

        // Use patch.lane when dragging vertically; otherwise keep the bar's current lane
        const drLane = patch.lane != null ? patch.lane : (dragged?._lane ?? 0);

        // Lock the dragged bar to its target lane so assignLanes doesn't relocate it
        const allPatches = { [id]: { ...patch, lane: drLane } };

        const leftBars = [], rightBars = [];
        laned.forEach(other => {
          if (other.id === id) return;
          if ((other._lane ?? 0) !== drLane) return;
          const os = getStart(other), oe = getEnd(other);
          if (os >= ne || oe <= ns) return;
          if (os < ns) leftBars.push(other);
          else rightBars.push(other);
        });

        // Push right: cascade, clamping to TL_END
        rightBars.sort((a,b) => getStart(a) - getStart(b));
        let rightEdge = ne.getTime() + 86400000;
        rightBars.forEach(other => {
          if (rightEdge >= TL_END.getTime()) return;
          const dur = getEnd(other) - getStart(other);
          const newStart = new Date(rightEdge);
          const newEnd = new Date(Math.min(newStart.getTime() + dur, TL_END.getTime()));
          allPatches[other.id] = { startDate:fmtDate(newStart), endDate:fmtDate(newEnd), quarterOnly:false, quarter:null };
          rightEdge = newEnd.getTime() + 86400000;
        });

        // Push left: cascade, clamping to TL_START
        leftBars.sort((a,b) => getEnd(b) - getEnd(a));
        let leftEdge = ns.getTime() - 86400000;
        leftBars.forEach(other => {
          if (leftEdge <= TL_START.getTime()) return;
          const dur = getEnd(other) - getStart(other);
          const newEnd = new Date(leftEdge);
          const newStart = new Date(Math.max(newEnd.getTime() - dur, TL_START.getTime()));
          allPatches[other.id] = { startDate:fmtDate(newStart), endDate:fmtDate(newEnd), quarterOnly:false, quarter:null };
          leftEdge = newStart.getTime() - 86400000;
        });

        onBatchUpdate(allPatches);
      }, [laned, onBatchUpdate]);

      const isFiltered = (ini) => {
        const { areas, criticality, status, pmOwner, confidence } = filters;
        if (areas.length && !areas.includes(ini.area)) return true;
        if (criticality.length && !criticality.includes(ini.criticality)) return true;
        if (status.length && !status.includes(ini.status)) return true;
        if (pmOwner && ini.pmOwner !== pmOwner) return true;
        if (confidence.length && !confidence.includes(ini.confidence)) return true;
        return false;
      };

      const gridSegs = zoom === 'quarter' ? HEADERS.quarters : HEADERS.months;
      const totalH = SWIM_STRIP + (collapsed ? 0 : ch);

      return (
        <div className="swimlane">
          <div className="swim-row" style={{ height: totalH, transition:'height .2s ease' }}>
            {/* Sticky label — full when at left edge, compact with rotated text when scrolled */}
            {(() => {
              const aColor = (areaColorMap||{})[area] || '#004879';
              if (isScrolled) {
                return (
                  <div className="swim-label" style={{ height: totalH, background: aColor, borderRight: 'none', padding: 0 }}>
                    <span style={{
                      writingMode: 'vertical-lr', transform: 'rotate(180deg)',
                      color: 'white', fontSize: 12, fontWeight: 700,
                      letterSpacing: '.04em', overflow: 'hidden',
                      textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                      maxHeight: totalH - 16, cursor: 'pointer',
                    }} onClick={onToggle}>{area}</span>
                  </div>
                );
              }
              return (
                <div className="swim-label" style={{ height: totalH, background: aColor + '18', borderRight: `3px solid ${aColor}`, padding: '0 16px' }}>
                  <div className="swim-label-inner">
                    <div className="swim-area-dot" style={{background: aColor}} />
                    <span className="swim-name">{area}</span>
                    <span className="swim-count">{inis.length}</span>
                    <button className="swim-toggle" onClick={onToggle}>
                      <span style={{fontSize:9}}>{collapsed?'▶':'▼'}</span>
                    </button>
                  </div>
                </div>
              );
            })()}

            {/* Timeline content */}
            <div className="swim-content" style={{ width: tw, height: totalH }}>
              <div className="swim-strip" style={{ height: SWIM_STRIP }} />
              {!collapsed && (
                <div style={{ position:'relative', height: ch }}>
                  {/* Grid lines */}
                  {gridSegs.map((seg,i) => {
                    const x = toPx(seg.start, dpx);
                    return <div key={i} className="grid-line" style={{ left:x, height:ch }} />;
                  })}
                  {/* Bars */}
                  {laned.map(ini => (
                    <IBar key={ini.id} ini={ini} dpx={dpx} zoom={zoom}
                      filtered={isFiltered(ini)} selected={ini.id===selId}
                      onSelect={onSelect} onUpdate={handleDragDrop} />
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       TIMELINE HEADER
    ═══════════════════════════════════════════════════════════════ */
    function TLHeader({ dpx, zoom, isScrolled }) {
      const tw = totalW(dpx);
      const todayX = toPx(new Date(), dpx);
      const showToday = todayX >= 0 && todayX <= tw;

      const Seg = ({ label, start, end, row, bold }) => {
        const lx = toPx(start, dpx);
        const rx = toPx(end, dpx);
        const w = rx - lx;
        if (w < 2) return null;
        return (
          <div className="hdr-seg" style={{
            left:lx, width:w, top: row*ROW_H, height: ROW_H,
            fontSize: bold ? 11 : 10,
            fontWeight: bold ? 700 : 500,
            color: bold ? '#041624' : '#64748b',
            textTransform: bold ? 'uppercase' : 'none',
            letterSpacing: bold ? '.05em' : '.02em',
          }}>
            {w > 22 ? label : ''}
          </div>
        );
      };

      return (
        <div className="tl-header" style={{ height: HDR_H }}>
          <div className="hdr-corner" style={isScrolled ? {padding:'0 8px 8px'} : {}}>
            {!isScrolled && <span className="hdr-corner-label">Product Area</span>}
          </div>
          <div className="hdr-dates" style={{ width: tw }}>
            {HEADERS.years.map((s,i) => <Seg key={i} {...s} row={0} bold />)}
            {HEADERS.quarters.map((s,i) => <Seg key={i} {...s} row={1} />)}
            {zoom !== 'quarter' && HEADERS.months.map((s,i) => <Seg key={i} {...s} row={2} />)}
            {showToday && (
              <div className="hdr-today-wrap" style={{ left:todayX }}>
                <div className="hdr-today-badge" style={{ top: 6 }}>Today</div>
                <div className="hdr-today-line" style={{ top: 26, height: HDR_H - 26 }} />
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       TIMELINE
    ═══════════════════════════════════════════════════════════════ */
    function Timeline({ inis, dpx, zoom, filters, collapsed, onToggle, selId, onSelect, onUpdate, onBatchUpdate, areaNames, areaColorMap, onDpxChange, minDpx, maxDpx, zoomFactor }) {
      const scrollRef = useRef(null);
      const [isScrolled, setIsScrolled] = useState(false);
      const tw = totalW(dpx);
      const pendingScrollRef = useRef(null);

      // Apply pending scroll after dpx-triggered re-render
      useEffect(() => {
        if (pendingScrollRef.current !== null && scrollRef.current) {
          scrollRef.current.scrollLeft = pendingScrollRef.current;
          pendingScrollRef.current = null;
        }
      });

      // Scroll to start of current quarter on mount
      useEffect(() => {
        requestAnimationFrame(() => {
          if (!scrollRef.current) return;
          const now = new Date();
          const qStart = new Date(now.getFullYear(), Math.floor(now.getMonth() / 3) * 3, 1);
          const offset = Math.max(0, toPx(qStart, dpx) - 32);
          scrollRef.current.scrollLeft = offset;
        });
      }, []); // eslint-disable-line

      // Ctrl+wheel to zoom centered on cursor
      useEffect(() => {
        const el = scrollRef.current;
        if (!el || !onDpxChange) return;
        const handleWheel = (e) => {
          if (!e.ctrlKey && !e.metaKey) return;
          e.preventDefault();
          const factor = e.deltaY < 0 ? zoomFactor : 1 / zoomFactor;
          const newDpx = Math.max(minDpx, Math.min(maxDpx, dpx * factor));
          if (newDpx === dpx) return;
          const rect = el.getBoundingClientRect();
          const lw = isScrolled ? LABEL_W_COMPACT : LABEL_W;
          const cursorInCanvas = el.scrollLeft + (e.clientX - rect.left) - lw;
          const newScroll = Math.max(0, cursorInCanvas * (newDpx / dpx) - (e.clientX - rect.left) + lw);
          pendingScrollRef.current = newScroll;
          onDpxChange(newDpx);
        };
        el.addEventListener('wheel', handleWheel, { passive: false });
        return () => el.removeEventListener('wheel', handleWheel);
      }, [dpx, isScrolled, onDpxChange, minDpx, maxDpx, zoomFactor]);

      // Track horizontal scroll to switch label between full and compact mode
      useEffect(() => {
        const el = scrollRef.current;
        if (!el) return;
        const onScroll = () => setIsScrolled(el.scrollLeft > 20);
        el.addEventListener('scroll', onScroll, { passive: true });
        return () => el.removeEventListener('scroll', onScroll);
      }, []);

      const names = areaNames || PRODUCT_AREAS;
      const byArea = useMemo(() => {
        const m = {};
        names.forEach(a => { m[a] = []; });
        inis.forEach(i => { if(m[i.area]) m[i.area].push(i); });
        return m;
      }, [inis, names]);

      const labelW = isScrolled ? LABEL_W_COMPACT : LABEL_W;
      return (
        <div ref={scrollRef} className="tl-scroll" onClick={() => onSelect(null)}
          style={{'--label-w': `${labelW}px`}}>
          <div style={{ minWidth: labelW + tw, display:'flex', flexDirection:'column' }}>
            <TLHeader dpx={dpx} zoom={zoom} isScrolled={isScrolled} />
            {names.map(area => (
              <Swimlane key={area} area={area} inis={byArea[area]||[]} dpx={dpx} zoom={zoom}
                filters={filters} collapsed={!!collapsed[area]}
                onToggle={() => onToggle(area)}
                selId={selId} onSelect={onSelect} onUpdate={onUpdate} onBatchUpdate={onBatchUpdate}
                areaColorMap={areaColorMap} isScrolled={isScrolled} />
            ))}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       DRAWER
    ═══════════════════════════════════════════════════════════════ */
    function Drawer({ ini, pmList, areaNames, onUpdate, onDelete, onClose, onCreate }) {
      const { user } = useAuth();
      const canEdit = user?.role === 'editor' || user?.role === 'admin';
      const [draft, setDraft] = useState(null);
      const [saved, setSaved] = useState(false);
      const saveTimer = useRef(null);
      const isNew = ini === 'new';

      useEffect(() => {
        if (isNew) {
          setDraft({ id:null, name:'', area:PRODUCT_AREAS[0], pmOwner:'', criticality:'Medium',
            confidence:'Opportunity', startDate:'', endDate:'', quarterOnly:false, quarter:null,
            status:'Discovery', description:'', okrLink:'', problemStatement:'',
            hypothesis:'', keyMetrics:'', dependencies:'', openRisks:'', notes:'' });
        } else if (ini) {
          setDraft({ ...ini });
        }
      }, [ini, isNew]);

      const upd = (field, value) => {
        setDraft(prev => {
          const next = { ...prev, [field]: value };
          if (!isNew) {
            clearTimeout(saveTimer.current);
            saveTimer.current = setTimeout(() => {
              onUpdate(next.id, next);
              setSaved(true);
              setTimeout(() => setSaved(false), 2000);
            }, 300);
          }
          return next;
        });
      };

      if (!draft) return null;
      const critColor = CRIT_COLORS[draft.criticality] || '#9E9E9E';

      const F = ({ label, children, fullWidth }) => (
        <div className={`drw-fld${fullWidth ? ' drw-full' : ''}`}>
          <label className="drw-lbl">{label}</label>
          <div>{children}</div>
        </div>
      );

      const Sel = ({ val, onChange, opts }) => canEdit
        ? (<select className="drw-sel" value={val||''} onChange={e=>onChange(e.target.value)}>
            <option value="">— select —</option>
            {opts.map(o=><option key={o} value={o}>{o}</option>)}
           </select>)
        : <span className="drw-static">{val || '—'}</span>;

      const Txt = ({ value, onChange, placeholder, type='text' }) => canEdit
        ? <input className="drw-input" type={type} value={value||''} onChange={onChange} placeholder={placeholder} />
        : <span className="drw-static">{value || <span className="drw-empty">{placeholder}</span>}</span>;

      const TxtArea = ({ value, onChange, placeholder, rows=3 }) => canEdit
        ? <textarea className="drw-ta" rows={rows} value={value||''} onChange={onChange} placeholder={placeholder} />
        : <span className="drw-static drw-static-multi">{value || <span className="drw-empty">{placeholder}</span>}</span>;

      return (
        <div className="drawer">
          <div className="drw-hdr" style={{ borderTop:`4px solid ${critColor}` }}>
            <div className="drw-hdr-top">
              <div className="drw-title-wrap">
                <div className="drw-area-tag">{draft.area}</div>
                {canEdit
                  ? <input className="drw-title" value={draft.name}
                      onChange={e=>upd('name',e.target.value)}
                      placeholder="Initiative name…" autoFocus={isNew} />
                  : <span className="drw-title drw-title-static">{draft.name}</span>
                }
              </div>
              <div className="drw-hdr-acts">
                {saved && <span className="save-ok">Saved</span>}
                <button className="drw-close" onClick={onClose}>✕</button>
              </div>
            </div>
            <div className="drw-pills">
              <span className="pill pill-crit" style={{background:critColor}}>{draft.criticality}</span>
              <span className="pill pill-st">{draft.status}</span>
              <span className="pill pill-conf">{draft.confidence}</span>
            </div>
          </div>

          <div className="drw-body">
            <div className="drw-sec">
              <div className="drw-sec-title">Details</div>
              <div className={!canEdit ? 'drw-2col' : undefined}>
                <F label="Product Area"><Sel val={draft.area} onChange={v=>upd('area',v)} opts={areaNames||PRODUCT_AREAS} /></F>
                <F label="PM Owner">
                  {canEdit
                    ? <select className="drw-sel" value={draft.pmOwner||''} onChange={e=>upd('pmOwner',e.target.value)}>
                        <option value="">— select PM —</option>
                        {pmList.map(pm => <option key={pm} value={pm}>{pm}</option>)}
                        {draft.pmOwner && !pmList.includes(draft.pmOwner) && (
                          <option value={draft.pmOwner}>{draft.pmOwner}</option>
                        )}
                      </select>
                    : <span className="drw-static">{draft.pmOwner || '—'}</span>
                  }
                </F>
                <F label="Criticality"><Sel val={draft.criticality} onChange={v=>upd('criticality',v)} opts={CRITICALITY_OPTIONS} /></F>
                <F label="Status"><Sel val={draft.status} onChange={v=>upd('status',v)} opts={STATUS_OPTIONS} /></F>
                <F label="Confidence"><Sel val={draft.confidence} onChange={v=>upd('confidence',v)} opts={CONFIDENCE_OPTIONS} /></F>
                <F label="Date Type">
                  {canEdit
                    ? <div className="radio-grp">
                        <label><input type="radio" checked={!draft.quarterOnly} onChange={()=>upd('quarterOnly',false)} /> Exact dates</label>
                        <label><input type="radio" checked={!!draft.quarterOnly} onChange={()=>upd('quarterOnly',true)} /> Quarter-only</label>
                      </div>
                    : <span className="drw-static">{draft.quarterOnly ? 'Quarter-only' : 'Exact dates'}</span>
                  }
                </F>
                {draft.quarterOnly ? (
                  <F label="Quarter"><Sel val={draft.quarter} onChange={v=>upd('quarter',v)} opts={QUARTER_OPTS} /></F>
                ) : (
                  <>
                    <F label="Start Date">
                      <Txt value={draft.startDate} onChange={e=>upd('startDate',e.target.value)} type="date" />
                    </F>
                    <F label="End Date">
                      <Txt value={draft.endDate} onChange={e=>upd('endDate',e.target.value)} type="date" />
                    </F>
                  </>
                )}
                <F label="OKR / Jira Link" fullWidth={!canEdit}>

    /* ═══════════════════════════════════════════════════════════════
       MULTI-SELECT
    ═══════════════════════════════════════════════════════════════ */
    function MS({ label, opts, sel, onChange }) {
      const [open, setOpen] = useState(false);
      const [pos, setPos] = useState({ top: 0, left: 0 });
      const triggerRef = useRef(null);
      const dropRef = useRef(null);

      useEffect(() => {
        const h = (e) => {
          if (
            triggerRef.current && !triggerRef.current.contains(e.target) &&
            dropRef.current && !dropRef.current.contains(e.target)
          ) setOpen(false);
        };
        document.addEventListener('mousedown', h);
        return () => document.removeEventListener('mousedown', h);
      }, []);

      const handleToggle = () => {
        if (!open && triggerRef.current) {
          const r = triggerRef.current.getBoundingClientRect();
          setPos({ top: r.bottom + 6, left: r.left });
        }
        setOpen(o => !o);
      };

      const toggle = (o) => onChange(sel.includes(o) ? sel.filter(s=>s!==o) : [...sel,o]);

      return (
        <div ref={triggerRef}>
          <button className={`ms-trigger${sel.length?' sel':''}`} onClick={handleToggle}>
            {sel.length ? `${label}: ${sel.length}` : label}
            <span className="ms-caret">{open?'▲':'▼'}</span>
          </button>
          {open && createPortal(
            <div ref={dropRef} className="ms-drop"
              style={{ position:'fixed', top: pos.top, left: pos.left, zIndex: 9000 }}>
              {opts.map(o=>(
                <label key={o} className="ms-opt">
                  <input type="checkbox" checked={sel.includes(o)} onChange={()=>toggle(o)} />{o}
                </label>
              ))}
            </div>,
            document.body
          )}
        </div>
      );
    }

    function KanbanCard({ ini, selected, areaColorMap, onSelect, onStatusChange }) {
      const { user } = useAuth();
      const canEdit = user?.role === 'editor' || user?.role === 'admin';
      const areaColor = (areaColorMap||{})[ini.area] || '#004879';
      const critColor = CRIT_COLORS[ini.criticality] || '#9E9E9E';

      const dateStr = ini.quarterOnly
        ? (ini.quarter || '')
        : [ini.startDate && fmtDateDisp(ini.startDate), ini.endDate && fmtDateDisp(ini.endDate)]
            .filter(Boolean).join(' – ');

      return (
        <div
          className={`kanban-card${selected ? ' kb-selected' : ''}`}
          draggable={canEdit}
          onClick={() => onSelect(ini.id)}
          onDragStart={e => { e.dataTransfer.setData('text/plain', ini.id); e.currentTarget.classList.add('kb-dragging'); }}
          onDragEnd={e => e.currentTarget.classList.remove('kb-dragging')}
        >
          <div className="kanban-card-stripe" style={{ background: areaColor }} />
          <div className="kanban-card-body">
            <span className="kanban-card-area-label" style={{ color: areaColor }}>{ini.area}</span>
            <div className="kanban-card-name">{ini.name}</div>
            <div className="kanban-card-footer">
              <span className="kanban-card-dates">{ini.pmOwner || ''}</span>
              <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                {dateStr && <span className="kanban-card-dates">{dateStr}</span>}
                <span className="kanban-crit" style={{ background: critColor + '1a', color: critColor }}>
                  {ini.criticality}
                </span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function KanbanView({ inis, filters, areaColorMap, selId, onSelect, onUpdate }) {
      const { user } = useAuth();
      const canEdit = user?.role === 'editor' || user?.role === 'admin';
      const [dragOver, setDragOver] = useState(null);

      const isFiltered = (ini) => {
        const { areas, criticality, status, pmOwner, confidence } = filters;
        if (areas.length && !areas.includes(ini.area)) return true;
        if (criticality.length && !criticality.includes(ini.criticality)) return true;
        if (status.length && !status.includes(ini.status)) return true;
        if (pmOwner && ini.pmOwner !== pmOwner) return true;
        if (confidence.length && !confidence.includes(ini.confidence)) return true;
        return false;
      };

      const visible = inis.filter(i => !isFiltered(i));

      const handleDrop = (e, status) => {
        e.preventDefault();
        const id = e.dataTransfer.getData('text/plain');
        if (id && canEdit) onUpdate(id, { status });
        setDragOver(null);
      };

      return (
        <div className="kanban-view">
          {STATUS_OPTIONS.map(status => {
            const cards = visible.filter(i => i.status === status);
            const col = STATUS_COLORS[status] || '#9E9E9E';
            return (
              <div
                key={status}
                className={`kanban-col${dragOver === status ? ' drag-over' : ''}`}
                onDragOver={e => { if (canEdit) { e.preventDefault(); setDragOver(status); } }}
                onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(null); }}
                onDrop={e => handleDrop(e, status)}
              >
                <div className="kanban-col-hdr">
                  <div className="kanban-col-dot" style={{ background: col }} />
                  <span className="kanban-col-name">{status}</span>
                  <span className="kanban-col-count">{cards.length}</span>
                </div>
                <div className="kanban-cards">
                  {cards.length === 0
                    ? <div className="kanban-empty">No initiatives</div>
                    : cards.map(ini => (
                        <KanbanCard
                          key={ini.id} ini={ini}
                          selected={ini.id === selId}
                          areaColorMap={areaColorMap}
                          onSelect={onSelect}
                          onUpdate={onUpdate}
                        />
                      ))
                  }
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    const ROLE_CARD_DESC = {
      admin:  'Full access — edit, manage areas & PMs, import/export',
      editor: 'Can create and edit initiatives on the roadmap',
      viewer: 'Read-only access to the roadmap',
    };

    function getInitials(name) {
      return name.trim().split(/\s+/).map(w => w[0] || '').join('').slice(0, 2).toUpperCase() || '?';
    }

    function UserManagementModal({ users, onSave, onClose }) {
      const [list, setList] = useState(users);
      const [showInvite, setShowInvite] = useState(false);
      const [draft, setDraft] = useState({ name: '', email: '', role: 'viewer' });
      const [inviting, setInviting] = useState(false);
      const [inviteMsg, setInviteMsg] = useState(null); // { type: 'success'|'error', text }

      const handleRoleChange = (id, role) =>
        setList(prev => prev.map(u => u.id === id ? { ...u, role } : u));

      const handleRemove = (id) =>
        setList(prev => prev.filter(u => u.id !== id));

      const handleAdd = async () => {
        if (!draft.name.trim() || !draft.email.trim()) return;
        setInviting(true);
        setInviteMsg(null);
        try {
          const res = await fetch('/api/invite-user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: draft.name.trim(), email: draft.email.trim(), role: draft.role }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to invite user');
          setList(prev => [...prev, {
            id: data.userId || Date.now().toString(),
            name: draft.name.trim(),
            email: draft.email.trim(),
            role: draft.role,
            initials: getInitials(draft.name),
          }]);
          setDraft({ name: '', email: '', role: 'viewer' });
          setShowInvite(false);
          setInviteMsg({ type: 'success', text: `Invite sent to ${draft.email.trim()}` });
        } catch (err) {
          setInviteMsg({ type: 'error', text: err.message });
        } finally {
          setInviting(false);
        }
      };

      return createPortal(
        <div className="modal-overlay" onMouseDown={onClose}>
          <div className="modal" style={{ width: 520, maxWidth: 'calc(100vw - 32px)' }}
               onMouseDown={e => e.stopPropagation()}>

            </div>

                {list.map(u => (
                  <div key={u.id} className="usr-row">
                    <div className={`usr-avatar user-avatar-${u.role}`}>{u.initials}</div>
                    <div className="usr-info">
                      <span className="usr-name">{u.name}</span>
                      <span className="usr-email">{u.email}</span>
                    </div>
                    <div className="usr-actions">
                      <select className="usr-role-sel" value={u.role}
                        onChange={e => handleRoleChange(u.id, e.target.value)}>
                        <option value="admin">Admin</option>
                        <option value="editor">Editor</option>
                        <option value="viewer">Viewer</option>
                      </select>
                      <button className="usr-remove" onClick={() => handleRemove(u.id)} title="Remove">✕</button>
                    </div>
                  </div>
                ))}
              </div>

              {inviteMsg && (
                <div style={{ margin: '8px 0', padding: '9px 14px', borderRadius: 8, fontSize: 12, fontWeight: 500,
                              background: inviteMsg.type === 'success' ? '#f0fdf4' : '#fff5f5',
                              border: `1px solid ${inviteMsg.type === 'success' ? '#bbf7d0' : '#f5c0c0'}`,
                              color: inviteMsg.type === 'success' ? '#15803d' : 'var(--hr)' }}>
                  {inviteMsg.type === 'success' ? '✓ ' : '✗ '}{inviteMsg.text}
                </div>
              )}
