              {showInvite ? (
                <div className="usr-invite-form">
                  <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', marginBottom: 12 }}>
                    Invite a new member
                  </div>
                  <div className="usr-invite-fields">
                    <div className="login-field">
                      <label>Full name</label>
                      <input value={draft.name} autoFocus
                        onChange={e => setDraft(p => ({ ...p, name: e.target.value }))}
                        placeholder="Jane Smith" />
                    </div>
                    <div className="login-field">
                      <label>Work email</label>
                      <input type="email" value={draft.email}
                        onChange={e => setDraft(p => ({ ...p, email: e.target.value }))}
                        placeholder="jane@amh.com" />
                    </div>
                  </div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)', marginBottom: 8 }}>
                    Access level
                  </div>
                  <div className="usr-role-cards">
                    {['admin', 'editor', 'viewer'].map(r => (
                      <button key={r} className={`usr-role-card${draft.role === r ? ' selected' : ''}`}
                        onClick={() => setDraft(p => ({ ...p, role: r }))}>
                        <div className={`usr-avatar user-avatar-${r}`} style={{ width: 30, height: 30, fontSize: 11 }}>
                          {r[0].toUpperCase()}
                        </div>
                        <span className="usr-role-card-name">
                          {r.charAt(0).toUpperCase() + r.slice(1)}
                        </span>
                        <span className="usr-role-card-desc">{ROLE_CARD_DESC[r]}</span>
                      </button>
                    ))}
                  </div>
                  <div className="usr-invite-actions">
                    <button className="btn btn-pri btn-sm"
                      onClick={handleAdd}
                      disabled={!draft.name.trim() || !draft.email.trim() || inviting}>
                      {inviting
                        ? <><div className="login-spinner" style={{width:13,height:13,borderWidth:2}} /> Sending…</>
                        : 'Send Invite'}
                    </button>
                    <button className="btn btn-sm"
                      style={{ border: '1px solid var(--border)', color: 'var(--text2)' }}
                      onClick={() => { setShowInvite(false); setInviteMsg(null); }}>
                      Cancel
                    </button>
                  </div>
                </div>
              ) : (
                <button className="usr-invite-trigger" onClick={() => setShowInvite(true)}>
                  <span style={{ fontSize: 18, lineHeight: 1 }}>+</span> Invite a team member
                </button>
              )}
            </div>

            <div className="modal-footer">
              <button className="btn btn-pri btn-sm" onClick={() => { onSave(list); onClose(); }}>
                Save changes
              </button>
            </div>
          </div>
        </div>,
        document.body
      );
    }

    const ROLE_PERMS = {
      admin:  [
        { label: 'View the roadmap',                  yes: true },
        { label: 'Create and edit initiatives',        yes: true },
        { label: 'Move and resize bars',               yes: true },
        { label: 'Manage product areas & PM owners',   yes: true },
        { label: 'Import, export, and reset data',     yes: true },
      ],
      editor: [
        { label: 'View the roadmap',                  yes: true },
        { label: 'Create and edit initiatives',        yes: true },
        { label: 'Move and resize bars',               yes: true },
        { label: 'Manage product areas & PM owners',   yes: false },
        { label: 'Import, export, and reset data',     yes: false },
      ],
      viewer: [
        { label: 'View the roadmap',                  yes: true },
        { label: 'Create and edit initiatives',        yes: false },
        { label: 'Move and resize bars',               yes: false },
        { label: 'Manage product areas & PM owners',   yes: false },
        { label: 'Import, export, and reset data',     yes: false },
      ],
    };

    function ProfileModal({ onClose }) {
      const { user, logout } = useAuth();
      const role = user?.role || 'viewer';
      const perms = ROLE_PERMS[role] || ROLE_PERMS.viewer;

      return createPortal(
        <div className="profile-overlay" onClick={onClose}>
          <div className="profile-modal" onClick={e => e.stopPropagation()}>
            <div className={`profile-hero profile-hero-${role}`}>
              <button className="profile-close" onClick={onClose}>✕</button>
              <div className={`profile-avatar profile-avatar-${role}`}>{user.initials}</div>
              <div>
                <div className="profile-name">{user.name}</div>
                <div className="profile-email">{user.email}</div>
              </div>
              <span className={`role-badge role-${role}`} style={{marginTop:2}}>{role}</span>
            </div>

            <div className="profile-body">
              <div>
                <div className="profile-section-title">Access Level</div>
                <div className="profile-perm-list">
                  {perms.map(p => (
                    <div key={p.label} className={`profile-perm ${p.yes ? 'yes' : 'no'}`}>
                      <div className="profile-perm-dot" />
                      {p.label}
                    </div>
                  ))}
                </div>
              </div>

              <button className="profile-signout" onClick={() => { onClose(); logout(); }}>
                Sign out
              </button>
            </div>
          </div>
        </div>,
        document.body
      );
    }

    function TopNav({ filters, onFilter, zoom, dpx, onZoom, onZoomIn, onZoomOut, minDpx, maxDpx, view, onView, pmList, onManagePMs, areaNames, onManageAreas, onManageUsers, onManageJira, onNew, onExport, onImport, onReset }) {
      const { user, logout } = useAuth();
      const role = user?.role || 'viewer';
      const canEdit = role === 'editor' || role === 'admin';
      const isAdmin = role === 'admin';

      const [setOpen, setSetOpen] = useState(false);
      const [showProfile, setShowProfile] = useState(false);
      const setRef = useRef(null);
      const impRef = useRef(null);

      useEffect(() => {
        const h=(e)=>{ if(setRef.current&&!setRef.current.contains(e.target)) setSetOpen(false); };
        document.addEventListener('mousedown',h);
        return ()=>document.removeEventListener('mousedown',h);
      }, []);

      const upd = (k,v) => onFilter({ ...filters, [k]:v });
      const hasF = filters.areas.length||filters.criticality.length||
                   filters.status.length||filters.confidence.length;

      const handleFile = (e) => {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = ev => { try { onImport(JSON.parse(ev.target.result)); } catch { alert('Invalid JSON.'); } };
        r.readAsText(f); e.target.value='';
      };

      return (
        <nav className="top-nav">
          <div className="nav-brand">
            <AMHLogo height={28} />
            <span className="nav-title">Product Roadmap</span>
          </div>

          <div className="nav-filters">
            <MS label="Product" opts={areaNames||PRODUCT_AREAS} sel={filters.areas} onChange={v=>upd('areas',v)} />
            <MS label="Criticality" opts={CRITICALITY_OPTIONS} sel={filters.criticality} onChange={v=>upd('criticality',v)} />
            <MS label="Status" opts={STATUS_OPTIONS} sel={filters.status} onChange={v=>upd('status',v)} />
            <MS label="Confidence" opts={CONFIDENCE_OPTIONS} sel={filters.confidence} onChange={v=>upd('confidence',v)} />
            {!!hasF && <button className="clear-btn" onClick={()=>onFilter({areas:[],criticality:[],status:[],pmOwner:'',confidence:[]})}>Clear filters</button>}
          </div>

          <div className="nav-right">
            <div className="view-toggle">
              <button className={`view-btn${view==='timeline'?' v-on':''}`} onClick={()=>onView('timeline')} title="Timeline view">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="0" y="2" width="13" height="2" rx="1" fill="currentColor"/><rect x="0" y="6" width="9" height="2" rx="1" fill="currentColor"/><rect x="0" y="10" width="11" height="2" rx="1" fill="currentColor"/></svg>
                Timeline
              </button>
              <button className={`view-btn${view==='kanban'?' v-on':''}`} onClick={()=>onView('kanban')} title="Kanban view">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="0" y="0" width="3.5" height="13" rx="1" fill="currentColor"/><rect x="4.75" y="0" width="3.5" height="9" rx="1" fill="currentColor"/><rect x="9.5" y="0" width="3.5" height="11" rx="1" fill="currentColor"/></svg>
                Kanban
              </button>
            </div>
            {view === 'timeline' && (
              <div className="zoom-grp" style={{marginLeft:10}}>
                {[['Qtr','quarter'],['Month','month'],['6-Week','week']].map(([lbl,z])=>(
                  <button key={z} className={`zoom-btn${zoom===z&&dpx===DAY_PX[z]?' z-on':''}`} onClick={()=>onZoom(z)}>{lbl}</button>
                ))}
              </div>
            )}
            {canEdit && (
              <button className="btn btn-pri btn-sm" style={{marginLeft:10}} onClick={onNew}>+ New Initiative</button>
            )}
            {isAdmin && (
              <div ref={setRef} style={{position:'relative'}}>
                <button className="icon-btn" style={{fontSize:22}} onClick={()=>setSetOpen(o=>!o)} title="Settings">⚙</button>
                {setOpen && (
                  <div className="set-drop">
                    <button className="set-item" onClick={()=>{onManageUsers();setSetOpen(false);}}>Manage Team Members</button>
                    <div className="set-div"/>
                    <button className="set-item" onClick={()=>{onManageAreas();setSetOpen(false);}}>Manage Product Areas</button>
                    <button className="set-item" onClick={()=>{onManagePMs();setSetOpen(false);}}>Manage PM Owners</button>
                    <div className="set-div"/>
                    <button className="set-item" onClick={()=>{onManageJira();setSetOpen(false);}}>Jira Integration</button>
                    <div className="set-div"/>
                    <button className="set-item" onClick={()=>{onExport();setSetOpen(false);}}>Export JSON</button>
                    <button className="set-item" onClick={()=>{impRef.current?.click();setSetOpen(false);}}>Import JSON</button>
                    <div className="set-div"/>
                    <button className="set-item set-danger" onClick={()=>{if(window.confirm('Reset to sample data?')){onReset();setSetOpen(false);}}}>Reset to Sample Data</button>
                  </div>
                )}
                <input ref={impRef} type="file" accept=".json" style={{display:'none'}} onChange={handleFile} />
              </div>
            )}
            {user && (
              <>
                <button className={`user-avatar-btn user-avatar-${role}`}
                  onClick={() => setShowProfile(true)} title={user.name}>
                  {user.initials}
                </button>
                {showProfile && <ProfileModal onClose={() => setShowProfile(false)} />}
              </>
            )}
          </div>
        </nav>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       APP ROOT
    ═══════════════════════════════════════════════════════════════ */
    const EMPTY_F = { areas:[], criticality:[], status:[], pmOwner:'', confidence:[] };

    const AUTH0_DOMAIN    = 'amhbgreen.us.auth0.com';
    const AUTH0_CLIENT_ID = 'QtKj6Vl83tRsfVKWMwmJZuL0MDwwh0wF';
    const ROLE_CLAIM      = 'https://amh-roadmap/role';

    const SB_URL = 'https://lkyahautfusinqpqmxbh.supabase.co';
    const SB_KEY = 'sb_publishable_yfjId2BbSu5oXMkqJzlSXA_uMCsbNS2';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    function getInitialsFromName(name) {
      return (name || '?').trim().split(/\s+/).map(w => w[0] || '').join('').slice(0, 2).toUpperCase() || '?';
    }

    function App() {
      const [user, setUser]         = useState(null);
      const [auth0, setAuth0]       = useState(null);
      const [loading, setLoading]   = useState(true);
      const [authError, setAuthError] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const client = await window.auth0.createAuth0Client({
              domain: AUTH0_DOMAIN,
              clientId: AUTH0_CLIENT_ID,
              authorizationParams: {
                redirect_uri: window.location.origin + window.location.pathname,
              },
            });

            // Handle redirect back from Auth0
            if (window.location.search.includes('code=') && window.location.search.includes('state=')) {
              await client.handleRedirectCallback();
              window.history.replaceState({}, document.title, window.location.pathname);
            }

            if (await client.isAuthenticated()) {
              const u = await client.getUser();
              const role = u[ROLE_CLAIM] || 'viewer';
              setUser({
                name:     u.name || u.email,
                email:    u.email,
                role,
                initials: getInitialsFromName(u.name || u.email),
                picture:  u.picture,
              });
            }

            setAuth0(client);
          } catch(e) {
            setAuthError(e.message);
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      const login = () => auth0?.loginWithRedirect();
      const logout = () => {
        setUser(null);
        auth0?.logout({ logoutParams: { returnTo: window.location.origin + window.location.pathname } });
      };

      if (loading) return (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center',
                      height:'100vh', background:'var(--bg)', flexDirection:'column', gap:16 }}>
          <div style={{ width:36, height:36, borderRadius:'50%', border:'3px solid var(--border)',
                        borderTopColor:'var(--hb)', animation:'spin 0.8s linear infinite' }} />
          <span style={{ fontSize:13, color:'var(--text2)' }}>Loading…</span>
        </div>
      );

      if (!user) return (
        <AuthContext.Provider value={{ user: null, logout }}>
          <LoginScreen onLogin={login} authError={authError} />
        </AuthContext.Provider>
      );

      return (
        <AuthContext.Provider value={{ user, logout }}>
          <AppInner />
        </AuthContext.Provider>
      );
    }

    function AppInner() {
      const [inis, setInis] = useState([]);
      const [pmList, setPmList] = useState([]);
      const [areaConfig, setAreaConfig] = useState(DEFAULT_AREAS);
      const [jiraConfig, setJiraConfig] = useState(DEFAULT_JIRA);
      const [users, setUsers] = useLocalStorage('amh-users-v1', DEFAULT_USERS);
      const [dbReady, setDbReady] = useState(false);

      const [filters, setFilters] = useState(EMPTY_F);
      const [zoom, setZoom] = useState('quarter');
      const [selId, setSelId] = useState(null);
      const [collapsed, setCollapsed] = useState({});
      const [showPMModal, setShowPMModal] = useState(false);
      const [showAreaModal, setShowAreaModal] = useState(false);
      const [showUsersModal, setShowUsersModal] = useState(false);
      const [showJiraModal, setShowJiraModal] = useState(false);
      const [view, setView] = useState('timeline');
      const [dpx, setDpx] = useState(DAY_PX['quarter']);

      const MIN_DPX = 2, MAX_DPX = 60, ZOOM_FACTOR = 1.35;

      // ── Supabase: initial load ──────────────────────────────────────
      useEffect(() => {
        async function load() {
          const [{ data: rows }, { data: cfg }] = await Promise.all([
            sb.from('initiatives').select('id,data').order('data->start'),
            sb.from('config').select('key,value'),
          ]);

          if (rows) {
            const loaded = rows.map(r => r.data);
            setInis(loaded.length ? loaded : SAMPLE);
            // Seed sample data if table was empty
            if (!loaded.length) {
              const upserts = SAMPLE.map(ini => ({ id: ini.id, data: ini }));
              await sb.from('initiatives').upsert(upserts);
            }
          }

          if (cfg) {
            const map = Object.fromEntries(cfg.map(c => [c.key, c.value]));
            if (map.areas && map.areas.length) setAreaConfig(map.areas);
            if (map.pms) setPmList(map.pms);
            if (map.jira && Object.keys(map.jira).length) setJiraConfig(map.jira);
          }

          setDbReady(true);
        }
        load();
      }, []);

      // ── Supabase: real-time subscriptions ──────────────────────────
      useEffect(() => {
        if (!dbReady) return;
        const channel = sb.channel('roadmap-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'initiatives' }, payload => {
            if (payload.eventType === 'DELETE') {
              setInis(prev => prev.filter(i => i.id !== payload.old.id));
            } else {
              const ini = payload.new.data;
              setInis(prev => {
                const idx = prev.findIndex(i => i.id === ini.id);
                return idx >= 0 ? prev.map(i => i.id === ini.id ? ini : i) : [...prev, ini];
              });
            }
          })
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'config' }, payload => {
            const { key, value } = payload.new;
            if (key === 'areas') setAreaConfig(value);
            if (key === 'pms') setPmList(value);
            if (key === 'jira') setJiraConfig(value);
          })
          .subscribe();
        return () => sb.removeChannel(channel);
      }, [dbReady]);

      // ── Supabase: write helpers ─────────────────────────────────────
      const saveConfig = useCallback(async (key, value) => {
        const { error } = await sb.from('config').upsert({ key, value, updated_at: new Date().toISOString() });
        if (error) console.error('[Supabase] config upsert failed:', error);
      }, []);

      const handleSetAreas = useCallback(async (value) => {
        setAreaConfig(value);
        await saveConfig('areas', value);
      }, [saveConfig]);

      const handleSetPms = useCallback(async (value) => {
        setPmList(value);
        await saveConfig('pms', value);
      }, [saveConfig]);

      const handleSetJira = useCallback(async (value) => {
        setJiraConfig(value);
        await saveConfig('jira', value);
      }, [saveConfig]);

      const handleDpxChange = useCallback((newDpx) => {
        const c = Math.max(MIN_DPX, Math.min(MAX_DPX, newDpx));
        setDpx(c);
        if (c <= 6) setZoom('quarter');
        else if (c <= 16) setZoom('month');
        else setZoom('week');
      }, []);

      const handleZoomPreset = useCallback((z) => {
        setZoom(z);
        setDpx(DAY_PX[z]);
      }, []);

      const areaNames = useMemo(() => areaConfig.map(a => a.name), [areaConfig]);
      const areaColorMap = useMemo(() => Object.fromEntries(areaConfig.map(a => [a.name, a.color])), [areaConfig]);

      const updIni = useCallback((id, patch) => {
        setInis(prev => {
          const updated = prev.map(i => i.id===id ? {...i,...patch} : i);
          const ini = updated.find(i => i.id===id);
          if (ini) sb.from('initiatives').upsert({ id, data: ini, updated_at: new Date().toISOString() })
            .then(({ error }) => { if (error) console.error('[Supabase] updIni failed:', error); });
          return updated;
        });
      }, []);

      const batchUpdIni = useCallback((patches) => {
        setInis(prev => {
          const updated = prev.map(i => patches[i.id] ? {...i,...patches[i.id]} : i);
          const upserts = Object.keys(patches).map(id => {
            const ini = updated.find(i => i.id===id);
            return ini ? { id, data: ini, updated_at: new Date().toISOString() } : null;
          }).filter(Boolean);
          if (upserts.length) sb.from('initiatives').upsert(upserts)
            .then(({ error }) => { if (error) console.error('[Supabase] batchUpdIni failed:', error); });
          return updated;
        });
      }, []);

      const delIni = useCallback((id) => {
        setInis(prev => prev.filter(i=>i.id!==id));
        setSelId(null);
        sb.from('initiatives').delete().eq('id', id)
          .then(({ error }) => { if (error) console.error('[Supabase] delIni failed:', error); });
      }, []);

      const createIni = useCallback((draft) => {
        const n = { ...draft, id:`${Date.now()}-${Math.random().toString(36).slice(2,7)}` };
        setInis(prev => [...prev, n]);
        setSelId(n.id);
        sb.from('initiatives').insert({ id: n.id, data: n })
          .then(({ error }) => { if (error) console.error('[Supabase] createIni failed:', error); });
      }, []);

      const handleExport = () => {
        const blob = new Blob([JSON.stringify(inis,null,2)],{type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href=url; a.download=`amh-roadmap-${new Date().toISOString().slice(0,10)}.json`;
        a.click(); URL.revokeObjectURL(url);
      };

      const handleImport = async (data) => {
        if (!Array.isArray(data)) { alert('Expected JSON array.'); return; }
        setInis(data);
        setSelId(null);
        await sb.from('initiatives').delete().neq('id', '__none__');
        const upserts = data.map(ini => ({ id: ini.id, data: ini }));
        await sb.from('initiatives').upsert(upserts);
      };

      const handleReset = async () => {
        setInis(SAMPLE);
        setSelId(null);
        await sb.from('initiatives').delete().neq('id', '__none__');
        const upserts = SAMPLE.map(ini => ({ id: ini.id, data: ini }));
        await sb.from('initiatives').upsert(upserts);
      };

      const selIni = selId==='new' ? 'new' : inis.find(i=>i.id===selId)||null;

      if (!dbReady) return (
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16}}>
          <div style={{width:36,height:36,border:'3px solid #e2e8f0',borderTopColor:'#004879',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
          <span style={{color:'#64748b',fontSize:14}}>Loading roadmap…</span>
        </div>
      );

      return (
        <div className="app">
          <TopNav
            filters={filters} onFilter={setFilters}
            zoom={zoom} dpx={dpx} onZoom={handleZoomPreset}
            onZoomIn={()=>handleDpxChange(dpx*ZOOM_FACTOR)}
            onZoomOut={()=>handleDpxChange(dpx/ZOOM_FACTOR)}
            minDpx={MIN_DPX} maxDpx={MAX_DPX}
            view={view} onView={setView}
            pmList={pmList} onManagePMs={()=>setShowPMModal(true)}
            areaNames={areaNames} onManageAreas={()=>setShowAreaModal(true)}
            onManageUsers={()=>setShowUsersModal(true)}
            onManageJira={()=>setShowJiraModal(true)}
            onNew={()=>setSelId('new')}
            onExport={handleExport}
            onImport={handleImport}
            onReset={handleReset}
          />
          <div className="main-area">
            {view === 'kanban'
              ? <KanbanView
                  inis={inis} filters={filters} areaColorMap={areaColorMap}
                  selId={selId} onSelect={setSelId} onUpdate={updIni}
                />
              : <Timeline
                  inis={inis} dpx={dpx} zoom={zoom} filters={filters}
                  collapsed={collapsed} onToggle={area=>setCollapsed(p=>({...p,[area]:!p[area]}))}
                  selId={selId} onSelect={setSelId} onUpdate={updIni} onBatchUpdate={batchUpdIni}
                  areaNames={areaNames} areaColorMap={areaColorMap}
                  onDpxChange={handleDpxChange} minDpx={MIN_DPX} maxDpx={MAX_DPX} zoomFactor={ZOOM_FACTOR}
                />
            }
            {selIni && (
              <Drawer
                ini={selIni} pmList={pmList} areaNames={areaNames}
                onUpdate={updIni} onDelete={delIni}
                onCreate={createIni} onClose={()=>setSelId(null)}
              />
            )}
          </div>
          {showPMModal && (
            <PMModal pmList={pmList} onSave={handleSetPms} onClose={()=>setShowPMModal(false)} />
          )}
          {showAreaModal && (
            <ProductAreaModal areas={areaConfig} onSave={handleSetAreas} onClose={()=>setShowAreaModal(false)} />
          )}
          {showUsersModal && (
            <UserManagementModal users={users} onSave={setUsers} onClose={()=>setShowUsersModal(false)} />
          )}
          {showJiraModal && (
            <JiraIntegrationModal config={jiraConfig} onSave={handleSetJira} onClose={()=>setShowJiraModal(false)} />
          )}
          {view === 'timeline' && (
            <div className="zoom-fab">
              <span className="zoom-fab-label">Zoom</span>
              <button className="zoom-fab-btn" onClick={()=>handleDpxChange(dpx/ZOOM_FACTOR)} disabled={dpx<=MIN_DPX} title="Zoom out">−</button>
              <button className="zoom-fab-btn" onClick={()=>handleDpxChange(dpx*ZOOM_FACTOR)} disabled={dpx>=MAX_DPX} title="Zoom in">+</button>
            </div>
          )}
        </div>
      );
    }

    /* ── Mount ── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
